name: Build Windows EXE

on:
  push:
    branches: [ master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install fastapi uvicorn requests python-dotenv
    
    - name: Build EXE (GUI mode, no console flash)
      run: |
        mkdir -p dist
        pyinstaller --onefile --name "心灵伙伴" --windowed --add-data "frontend;frontend" --add-data "admin;admin" start.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 心灵伙伴-EXE
        path: dist/心灵伙伴.exe
